<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In – ZenoRide</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../CSS/main.css" />
  </head>
  <body class="auth-page">
    <div class="auth-wrapper">
      <div class="auth-illustration-side">
        <img
          src="../images/auth-illustration.svg"
          alt="ZenoRide"
          class="auth-illustration-img"
        />
        <p class="auth-illustration-tagline">Your ride is just a tap away</p>
      </div>
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <a href="Home.html" class="auth-logo-brand">
            <i class="fa-solid fa-bolt"></i> ZenoRide
          </a>
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to book your next ride.</p>

        <!-- Error Alert -->
        <div class="alert alert-error" id="loginAlert" style="display: none">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="alertMsg"></span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <div class="input-group">
              <i class="input-icon fa-solid fa-envelope"></i>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
              <i class="input-icon fa-solid fa-lock"></i>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="input-toggle"
                id="togglePass"
                aria-label="Toggle password"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="btn btn-accent btn-lg w-full"
            id="submitBtn"
            style="margin-top: 4px"
          >
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </button>
        </form>

        <p class="auth-footer-link">
          Don't have an account? <a href="signup.html">Create one free</a>
        </p>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../Js/auth.js"></script>
    <script src="../Js/api.js"></script>
    <script src="../Js/toast.js"></script>
    <script src="../Js/login.js"></script>
  </body>
</html>
