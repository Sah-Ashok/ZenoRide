<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <circle cx="200" cy="200" r="180" fill="#7c6ef604"/>
  <circle cx="260" cy="160" r="100" fill="#7c6ef606"/>

  <!-- Phone device -->
  <g transform="translate(110, 50)">
    <!-- Shadow -->
    <rect x="8" y="8" width="170" height="300" rx="24" fill="#0a0d1a" opacity="0.45"/>
    <!-- Phone body -->
    <rect x="0" y="0" width="170" height="300" rx="24" fill="#181e35" stroke="#2a3060" stroke-width="2"/>
    <!-- Screen area -->
    <rect x="10" y="30" width="150" height="240" rx="10" fill="#101525"/>

    <!-- App header bar -->
    <rect x="10" y="30" width="150" height="40" rx="10" fill="#1e2545"/>
    <circle cx="35" cy="50" r="10" fill="#7c6ef630"/>
    <text x="35" y="54" text-anchor="middle" fill="#a89cff" font-size="11" font-family="Inter, sans-serif" font-weight="800">Z</text>
    <rect x="52" y="44" width="60" height="6" rx="3" fill="#2a3060"/>
    <rect x="52" y="54" width="40" height="4" rx="2" fill="#1e2545"/>

    <!-- Map area on screen -->
    <rect x="16" y="78" width="138" height="100" rx="8" fill="#151a30"/>
    <!-- Map grid lines -->
    <line x1="20" y1="100" x2="150" y2="100" stroke="#1e2545" stroke-width="0.8"/>
    <line x1="20" y1="120" x2="150" y2="120" stroke="#1e2545" stroke-width="0.8"/>
    <line x1="20" y1="140" x2="150" y2="140" stroke="#1e2545" stroke-width="0.8"/>
    <line x1="55" y1="82" x2="55" y2="174" stroke="#1e2545" stroke-width="0.8"/>
    <line x1="95" y1="82" x2="95" y2="174" stroke="#1e2545" stroke-width="0.8"/>
    <line x1="130" y1="82" x2="130" y2="174" stroke="#1e2545" stroke-width="0.8"/>
    <!-- Route on map -->
    <path d="M40 155 Q70 110 120 95" stroke="#7c6ef6" stroke-width="2.5" stroke-dasharray="5 3" fill="none" stroke-linecap="round"/>
    <!-- Pickup dot -->
    <circle cx="40" cy="155" r="5" fill="#3dd68c"/>
    <circle cx="40" cy="155" r="2.5" fill="#102a1e"/>
    <!-- Destination dot -->
    <circle cx="120" cy="95" r="5" fill="#ff6b7a"/>
    <circle cx="120" cy="95" r="2.5" fill="#2c1520"/>

    <!-- Input fields on screen -->
    <rect x="16" y="186" width="138" height="32" rx="8" fill="#1e2545"/>
    <circle cx="32" cy="202" r="4" fill="#3dd68c" opacity="0.6"/>
    <rect x="42" y="198" width="80" height="5" rx="2.5" fill="#2a3060"/>
    <text x="44" y="207" fill="#565e7c" font-size="7" font-family="Inter, sans-serif">Current Location</text>

    <rect x="16" y="224" width="138" height="32" rx="8" fill="#1e2545"/>
    <circle cx="32" cy="240" r="4" fill="#ff6b7a" opacity="0.6"/>
    <rect x="42" y="236" width="70" height="5" rx="2.5" fill="#2a3060"/>
    <text x="44" y="245" fill="#565e7c" font-size="7" font-family="Inter, sans-serif">Where to?</text>

    <!-- Notch -->
    <rect x="55" y="10" width="60" height="10" rx="5" fill="#2a3060"/>

    <!-- Home bar -->
    <rect x="60" y="282" width="50" height="5" rx="2.5" fill="#2a3060"/>
  </g>

  <!-- Floating card - ride details -->
  <g transform="translate(220, 240)">
    <rect x="0" y="0" width="130" height="80" rx="12" fill="#181e35" stroke="#7c6ef630" stroke-width="1.5"/>
    <!-- Car icon -->
    <rect x="14" y="14" width="32" height="16" rx="5" fill="#7c6ef6"/>
    <rect x="20" y="6" width="18" height="14" rx="4" fill="#6558d4"/>
    <circle cx="20" cy="33" r="4" fill="#2a3060"/>
    <circle cx="40" cy="33" r="4" fill="#2a3060"/>
    <!-- Text lines -->
    <rect x="58" y="14" width="56" height="5" rx="2.5" fill="#a89cff40"/>
    <rect x="58" y="24" width="40" height="4" rx="2" fill="#2a3060"/>
    <!-- Status badge -->
    <rect x="14" y="50" width="70" height="18" rx="9" fill="#3dd68c18"/>
    <circle cx="26" cy="59" r="3" fill="#3dd68c"/>
    <rect x="34" y="56" width="40" height="4" rx="2" fill="#3dd68c50"/>
  </g>

  <!-- Floating notification -->
  <g transform="translate(30, 160)">
    <rect x="0" y="0" width="100" height="50" rx="10" fill="#181e35" stroke="#7c6ef620" stroke-width="1"/>
    <circle cx="20" cy="18" r="8" fill="#7c6ef620"/>
    <text x="20" y="22" text-anchor="middle" fill="#a89cff" font-size="10" font-family="Inter, sans-serif">🔔</text>
    <rect x="35" y="12" width="50" height="4" rx="2" fill="#2a3060"/>
    <rect x="35" y="20" width="36" height="3" rx="1.5" fill="#1e2545"/>
    <rect x="12" y="34" width="76" height="4" rx="2" fill="#3dd68c18"/>
  </g>

  <!-- Sparkles -->
  <circle cx="50" cy="80" r="2" fill="#a89cff" opacity="0.4"/>
  <circle cx="340" cy="60" r="1.5" fill="#ffc145" opacity="0.35"/>
  <circle cx="370" cy="350" r="2" fill="#a89cff" opacity="0.3"/>
  <circle cx="80" cy="340" r="1.5" fill="#ffc145" opacity="0.3"/>
  <circle cx="350" cy="150" r="1" fill="#7c6ef6" opacity="0.5"/>
</svg>
